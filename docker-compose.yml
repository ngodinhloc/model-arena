services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena
      POSTGRES_DB: arena
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena -d arena"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      APP_ENV: "DEV"
      SERVICE_NAME: "backend"
      CORS_ORIGINS: "http://localhost:3000"
      DATABASE_URL: "postgresql://arena:arena@postgres:5432/arena"
      REDIS_URL: "redis://redis:6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_dist:/app/dist
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  candidate-agent:
    build:
      context: ./candidate-agent
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8001:8000"
    env_file:
      - path: ./candidate-agent/.env
        required: false
    environment:
      APP_ENV: "DEV"
      SERVICE_NAME: "candidate-agent"
      REDIS_URL: "redis://redis:6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      CORS_ORIGINS: "http://localhost:3000"
    volumes:
      - ./candidate-agent:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  judge-agent:
    build:
      context: ./judge-agent
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8002:8000"
    env_file:
      - path: ./judge-agent/.env
        required: false
    environment:
      APP_ENV: "DEV"
      SERVICE_NAME: "judge-agent"
      REDIS_URL: "redis://redis:6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      CORS_ORIGINS: "http://localhost:3000"
    volumes:
      - ./judge-agent:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  score-agent:
    build:
      context: ./score-agent
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8003:8000"
    env_file:
      - path: ./score-agent/.env
        required: false
    environment:
      APP_ENV: "DEV"
      SERVICE_NAME: "score-agent"
      REDIS_URL: "redis://redis:6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      CORS_ORIGINS: "http://localhost:3000"
    volumes:
      - ./score-agent:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  recover-service:
    build:
      context: ./recover-service
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8004:8000"
    environment:
      PORT: "8000"
      APP_ENV: "DEV"
      SERVICE_NAME: "recover-service"
      DATABASE_URL: "postgresql://arena:arena@postgres:5432/arena"
      REDIS_URL: "redis://redis:6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      STALE_THRESHOLD_SECONDS: "120"
      SWEEP_INTERVAL_SECONDS: "30"
      MAX_RETRIES: "3"
    volumes:
      - ./recover-service:/app
      - recover_service_node_modules:/app/node_modules
      - recover_service_dist:/app/dist
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: infra/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      API_TARGET: http://backend:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_node_modules:
  backend_dist:
  recover_service_node_modules:
  recover_service_dist:
